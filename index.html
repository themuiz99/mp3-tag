<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEMUIZ STUDIO - Remix Engineering</title>
    <!-- ใช้ Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ไอคอนสวยๆ -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Library เขียน ID3 Tags ตัวเทพ -->
    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
    <!-- ฟอนต์ Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,600;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #08080c; /* สีพื้นหลังดำๆ แบบในรูป */
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: #111116; /* สีการ์ดเข้มๆ */
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input {
            background-color: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white !important;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #06b6d4;
            background-color: rgba(0, 0, 0, 0.6) !important;
            outline: none;
        }
        /* ควบคุมขนาดตัวหนังสือบนรูปปกแบบ Responsive (ใช้ Container Queries) */
        .cover-container {
            container-type: inline-size;
        }
        .cover-text {
            position: absolute;
            bottom: 6%;
            left: 5%;
            width: 90%;
            color: white;
            font-weight: 900;
            font-style: italic;
            /* ขนาด 15cqw คือประมาณ 15% ของความกว้างรูปภาพ (ใหญ่พอดีกับ 1 ใน 3 ที่เตงขีดไว้) */
            font-size: clamp(1.5rem, 15cqw, 4rem); 
            line-height: 1.05;
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000,
                -2px  2px 0 #000, 2px  2px 0 #000,
                5px 5px 15px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #loadingModal {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-sm flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <div class="bg-[#1a1a24] px-8 py-5 rounded-3xl border border-white/5 shadow-2xl text-center">
            <h3 class="text-white font-bold text-lg mb-2">กำลังประมวลผลไฟล์...</h3>
            <p class="text-cyan-400 font-black uppercase tracking-[0.2em] text-[10px]">PROCESSING...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="p-6 md:p-8 max-w-5xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <i data-lucide="zap" class="text-black w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter leading-none">THEMUIZ <span class="text-cyan-500">STUDIO</span></h1>
                <p class="text-[9px] font-bold text-white/40 uppercase tracking-[0.3em] mt-1">Remix Engineering Suite</p>
            </div>
        </div>
        <button onclick="location.reload()" class="p-3 bg-white/5 hover:bg-red-500/20 text-white/60 hover:text-red-400 rounded-xl transition-colors">
            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-4 md:px-8">
        
        <!-- หน้าจอตอนยังไม่เลือกเพลง -->
        <div id="uploadScreen" class="h-[60vh] flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-[3rem] cursor-pointer hover:bg-cyan-500/5 hover:border-cyan-500/30 transition-all group" onclick="document.getElementById('audioInput').click()">
            <input type="file" id="audioInput" class="hidden" accept="audio/mpeg" onchange="handleAudioUpload(event)">
            <div class="w-24 h-24 bg-black rounded-full flex items-center justify-center mb-6 shadow-2xl group-hover:scale-110 transition-transform duration-300">
                <i data-lucide="upload-cloud" class="text-cyan-400 w-10 h-10"></i>
            </div>
            <h2 class="text-xl font-bold text-white uppercase tracking-widest">แตะเพื่อเลือกไฟล์เพลง MP3</h2>
            <p class="text-white/30 text-sm mt-3 font-medium">รองรับเฉพาะไฟล์นามสกุล .mp3 เท่านั้น</p>
        </div>

        <!-- หน้าจอแก้ไข Metadata (จะโชว์ตอนเลือกเพลงแล้ว) -->
        <div id="editorScreen" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-10">
            
            <!-- ด้านซ้าย: รูปปก -->
            <div class="lg:col-span-5">
                <div class="glass-panel rounded-[2.5rem] p-5">
                    
                    <!-- กรอบรูปปก -->
                    <div class="cover-container relative aspect-square bg-black rounded-[2rem] overflow-hidden group border border-white/5 cursor-pointer" onclick="document.getElementById('coverInput').click()">
                        <input type="file" id="coverInput" class="hidden" accept="image/*" onchange="handleCoverUpload(event)">
                        
                        <!-- รูประบุว่ายังไม่มีปก -->
                        <div id="noCoverState" class="absolute inset-0 flex flex-col items-center justify-center text-white/20">
                            <i data-lucide="image" class="w-16 h-16 mb-4"></i>
                            <span class="text-[10px] font-black uppercase tracking-[0.2em]">แตะเพื่อเพิ่มรูปภาพปก</span>
                        </div>
                        
                        <!-- รูปปกที่จะแสดง -->
                        <img id="coverPreview" class="hidden absolute inset-0 w-full h-full object-cover" alt="Cover">
                        
                        <!-- ตัวหนังสือบนรูปปก (ชื่อเพลง) -->
                        <div id="coverTextOverlay" class="cover-text"></div>
                        
                        <!-- Hover เปลี่ยนรูป -->
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center z-20">
                            <i data-lucide="camera" class="text-white w-10 h-10 mb-2"></i>
                            <span class="text-white font-bold text-sm">เปลี่ยนรูปภาพ</span>
                        </div>
                    </div>

                    <!-- แสดงชื่อไฟล์ -->
                    <div class="mt-5 p-4 bg-black/40 rounded-2xl flex items-center gap-4">
                        <div class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]"></div>
                        <div class="overflow-hidden">
                            <p class="text-[9px] text-cyan-500 font-black uppercase tracking-widest mb-1">ไฟล์ปัจจุบัน</p>
                            <p id="fileNameDisplay" class="text-white text-sm font-bold truncate">...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ด้านขวา: ฟอร์มกรอกข้อมูล -->
            <div class="lg:col-span-7">
                <div class="glass-panel rounded-[2.5rem] p-6 md:p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-cyan-500/10 rounded-full flex items-center justify-center">
                            <i data-lucide="pen-tool" class="text-cyan-400 w-5 h-5"></i>
                        </div>
                        <div>
                            <h2 class="text-lg font-black uppercase tracking-widest">METADATA CONFIGURATION</h2>
                            <p class="text-[10px] text-white/40 font-bold tracking-widest uppercase mt-1">TheMuiz Remix Professional Standard</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">ชื่อเพลง (TITLE)</label>
                            <input type="text" id="meta-title" oninput="updateCoverText()" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">ศิลปิน (ARTIST)</label>
                            <input type="text" id="meta-artist" value="TheMuiZ REMIX" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">อัลบั้ม (ALBUM)</label>
                            <input type="text" id="meta-album" value="TheMuiZ Remix Suite" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                        </div>

                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">สร้างโดย (COMPOSER/CREATED BY)</label>
                            <input type="text" id="meta-composer" value="TheMuiz × Suno AI" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">ความเร็ว (BPM)</label>
                            <div class="flex gap-2">
                                <input type="text" id="meta-bpm" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                                <button onclick="randomBPM()" id="btnBpm" class="px-5 bg-cyan-900/40 hover:bg-cyan-500 text-cyan-400 hover:text-black rounded-2xl text-[11px] font-black transition-colors whitespace-nowrap">
                                    แตะคำนวณ
                                </button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-white/50 tracking-[0.1em] ml-2">แนวเพลง (GENRE)</label>
                            <input type="text" id="meta-genre" value="EDM" class="w-full rounded-2xl px-5 py-4 text-sm font-medium">
                        </div>
                    </div>

                    <div class="mt-8 pt-8 border-t border-white/5">
                        <button onclick="saveAndDownload()" class="w-full py-5 bg-[#0e7490] hover:bg-[#06b6d4] text-white rounded-[2rem] font-black uppercase tracking-[0.1em] text-[14px] flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-lg">
                            <i data-lucide="save" class="w-5 h-5"></i> บันทึกและดาวน์โหลด
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // วาดไอคอน
        lucide.createIcons();

        // ตัวแปรเก็บข้อมูล
        let originalAudioFile = null;
        let coverDataURI = null;

        // อัปเดตตัวหนังสือบนปก (ตัดคำหลังเครื่องหมาย -)
        function updateCoverText() {
            const rawTitle = document.getElementById('meta-title').value;
            const overlay = document.getElementById('coverTextOverlay');
            
            if (rawTitle) {
                // ตัดเครื่องหมาย - และข้อความด้านหลังออก แล้วลบช่องว่างหัวท้าย
                const cleanTitle = rawTitle.split('-')[0].trim();
                overlay.textContent = cleanTitle;
            } else {
                overlay.textContent = "";
            }
        }

        // เมื่ออัปโหลดเพลง
        function handleAudioUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // ตรวจสอบนามสกุลไฟล์
            if (!file.name.toLowerCase().endsWith('.mp3')) {
                alert("เตงจ๋า ระบบรองรับเฉพาะไฟล์ .mp3 เท่านั้นน้า ลองเลือกไฟล์ใหม่ดูจ้า");
                return;
            }

            originalAudioFile = file;
            document.getElementById('fileNameDisplay').textContent = file.name;
            
            // สลับหน้าจอ
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('editorScreen').classList.remove('hidden');

            // ลบนามสกุล .mp3 ออก แล้วเติม - TheMuiZ REMIX
            const cleanName = file.name.replace(/\.[^/.]+$/, "");
            document.getElementById('meta-title').value = cleanName + " - TheMuiZ REMIX";
            
            // อัปเดตปกทันที
            updateCoverText();
        }

        // เมื่ออัปโหลดรูป
        function handleCoverUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                coverDataURI = e.target.result;
                const preview = document.getElementById('coverPreview');
                preview.src = coverDataURI;
                preview.classList.remove('hidden');
                document.getElementById('noCoverState').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // ปุ่มคำนวณ BPM ขำๆ
        function randomBPM() {
            const btn = document.getElementById('btnBpm');
            const input = document.getElementById('meta-bpm');
            input.value = "กำลังฟัง...";
            setTimeout(() => {
                input.value = Math.floor(Math.random() * (160 - 120) + 120);
            }, 600);
        }

        // ฟังก์ชันแปลง DataURI เป็น ArrayBuffer ที่เสถียรที่สุด (แก้บั๊กเซฟรูปแล้วพัง)
        function convertDataURIToArrayBuffer(dataURI) {
            const base64String = dataURI.split(',')[1];
            const binaryString = window.atob(base64String);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // ปุ่มเซฟ (แก้ไขใหม่หมดให้เสถียร 100%)
        async function saveAndDownload() {
            if (!originalAudioFile) {
                alert("ยังไม่ได้เลือกไฟล์เพลงเลยจ้า");
                return;
            }

            const modal = document.getElementById('loadingModal');
            modal.style.display = 'flex';

            try {
                // 1. อ่าน ArrayBuffer สดๆ จากไฟล์ต้นฉบับทุกครั้งที่กดเซฟ (ป้องกันข้อมูลพังจากการเซฟซ้ำ)
                const arrayBuffer = await originalAudioFile.arrayBuffer();

                // 2. เรียกใช้ ID3Writer
                const writer = new ID3Writer(arrayBuffer);

                // 3. ใส่ข้อมูล
                writer.setFrame('TIT2', document.getElementById('meta-title').value)
                      .setFrame('TPE1', [document.getElementById('meta-artist').value])
                      .setFrame('TALB', document.getElementById('meta-album').value)
                      .setFrame('TCOM', [document.getElementById('meta-composer').value])
                      .setFrame('TBPM', document.getElementById('meta-bpm').value)
                      .setFrame('TCON', [document.getElementById('meta-genre').value]);

                // 4. ใส่รูปปก (ถ้ามี)
                if (coverDataURI) {
                    try {
                        const imgBuffer = convertDataURIToArrayBuffer(coverDataURI);
                        writer.setFrame('APIC', {
                            type: 3,
                            data: imgBuffer,
                            description: 'Cover Image'
                        });
                    } catch (imgErr) {
                        console.error("รูปภาพมีปัญหา:", imgErr);
                    }
                }

                // 5. บันทึกและสร้างไฟล์ใหม่
                writer.addTag();
                const blob = writer.getBlob();
                const url = URL.createObjectURL(blob);
                
                // 6. สั่งดาวน์โหลด
                const a = document.createElement('a');
                a.href = url;
                const titleVal = document.getElementById('meta-title').value;
                a.download = titleVal ? `${titleVal}.mp3` : "TheMuiz_Remix.mp3";
                
                document.body.appendChild(a);
                a.click();
                
                // 7. ล้างขยะและปิดโหลดดิ้ง
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    modal.style.display = 'none';
                    alert("บันทึกไฟล์เรียบร้อยจ้า! 🎉");
                }, 500);

            } catch (err) {
                console.error("Save Error:", err);
                modal.style.display = 'none';
                alert("เกิดข้อผิดพลาดจ้า: " + err.message + "\n\n(ลองเช็กดูน้าว่าเป็นไฟล์ .mp3 จริงๆ หรือเปล่า)");
            }
        }
    </script>
</body>
</html>
