<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEMUIZ STUDIO - Remix Engineering Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,700;1,900&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #08080c;
            color: white;
        }
        .glass-panel {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input, textarea {
            color: white !important;
            font-family: 'Kanit', sans-serif;
        }
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* ชื่อเพลงบนปก ปรับตามสั่ง */
        .cover-text-overlay {
            position: absolute;
            bottom: 5%;
            left: 5%;
            width: 90%;
            color: white;
            font-weight: 900;
            font-style: italic; /* ตัวเอียง */
            line-height: 1;
            text-align: left;
            /* ขอบตัวหนังสือสีดำ */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 4px  4px 15px rgba(0,0,0,0.9);
            pointer-events: none;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="loadingOverlay">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-cyan-400 font-black uppercase tracking-widest text-sm">กำลังบันทึกไฟล์เพลงจ้า</p>
    </div>

    <div id="cropModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/95 p-6 backdrop-blur-md">
        <div class="bg-[#12121a] border border-white/10 rounded-[2.5rem] p-8 max-w-2xl w-full shadow-2xl text-center">
            <h3 class="text-2xl font-bold text-white mb-6">ตรวจสอบความสวยงาม</h3>
            <div class="relative aspect-square bg-black rounded-3xl overflow-hidden border border-white/5 mb-8">
                <img id="cropPreview" class="w-full h-full object-cover" src="" alt="To crop">
            </div>
            <div class="flex gap-4">
                <button onclick="closeCrop()" class="flex-1 py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-bold text-white">เปลี่ยนรูป</button>
                <button onclick="confirmCrop()" class="flex-1 py-4 bg-cyan-600 hover:bg-cyan-500 rounded-2xl font-bold text-white">ตกลง ใช้รูปนี้</button>
            </div>
        </div>
    </div>

    <header class="max-w-6xl mx-auto flex items-center justify-between mb-12">
        <div class="flex items-center gap-5">
            <div class="relative w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-bolt text-black text-2xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white leading-none">THEMUIZ <span class="text-cyan-500 underline decoration-2">STUDIO</span></h1>
                <p class="text-[9px] font-bold text-white uppercase tracking-[0.4em] mt-2 opacity-60">Remix Engineering Suite</p>
            </div>
        </div>
        <button onclick="location.reload()" class="p-3 bg-white/5 hover:bg-red-500/10 hover:text-red-400 rounded-xl transition-all text-[10px] font-black uppercase border border-white/5">
            เคลียร์ไฟล์
        </button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="idleState" class="h-[400px] border-2 border-dashed border-white/10 rounded-[4rem] flex flex-col items-center justify-center cursor-pointer hover:bg-cyan-500/[0.02] transition-all group" onclick="document.getElementById('audioInput').click()">
            <input type="file" id="audioInput" class="hidden" accept="audio/mpeg" onchange="handleAudioUpload(event)">
            <i class="fa-solid fa-cloud-arrow-up text-cyan-400 text-5xl mb-6"></i>
            <h2 class="text-xl font-bold text-white uppercase">เลือกไฟล์เพลง MP3</h2>
        </div>

        <div id="editorState" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-panel rounded-[3rem] p-6 shadow-2xl relative">
                    <div id="coverContainer" class="relative aspect-square rounded-[2rem] overflow-hidden bg-black border border-white/5 group">
                        <div id="noCover" class="w-full h-full flex flex-col items-center justify-center text-white/20">
                            <i class="fa-solid fa-image text-6xl"></i>
                            <span class="text-[10px] mt-4 font-bold uppercase tracking-widest">ยังไม่มีรูปหน้าปก</span>
                        </div>
                        <img id="coverPreviewMain" class="hidden w-full h-full object-cover" alt="Cover">
                        
                        <!-- ชื่อเพลงบนรูปปก (มุมซ้ายล่าง) -->
                        <div id="textOverlay" class="cover-text-overlay"></div>
                        
                        <div onclick="document.getElementById('coverInput').click()" class="absolute inset-0 bg-cyan-500/80 opacity-0 group-hover:opacity-100 transition-all flex flex-col items-center justify-center cursor-pointer text-black z-20">
                            <i class="fa-solid fa-camera text-3xl mb-2"></i>
                            <span class="font-black uppercase text-xs">เปลี่ยนภาพปก</span>
                        </div>
                        <input type="file" id="coverInput" class="hidden" accept="image/*" onchange="handleCoverUpload(event)">
                    </div>

                    <div class="mt-6 p-4 bg-black/40 rounded-2xl border border-white/5">
                        <span class="text-[10px] text-cyan-500 font-black uppercase tracking-widest block mb-1">ไฟล์เพลงปัจจุบัน</span>
                        <p id="displayFileName" class="text-white text-sm font-bold truncate">...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 glass-panel rounded-[3.5rem] p-8 md:p-10 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">ชื่อเพลง (Title)</label>
                        <input type="text" id="meta-title" oninput="updateOverlayText()" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">ศิลปิน (Artist)</label>
                        <input type="text" id="meta-artist" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">อัลบั้ม (Album)</label>
                        <input type="text" id="meta-album" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                    </div>
                    
                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">สร้างโดย (Composer/Created By)</label>
                        <input type="text" id="meta-composer" value="TheMuiz × Suno AI" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">ความเร็ว (BPM)</label>
                        <div class="flex gap-2">
                            <input type="text" id="meta-bpm" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                            <button onclick="calculateBPM()" id="bpmBtn" class="px-4 bg-cyan-600 hover:bg-cyan-500 rounded-2xl text-[10px] font-black text-white">คำนวณ</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/60 tracking-widest ml-1">แนวเพลง (Genre)</label>
                        <input type="text" id="meta-genre" class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none text-white focus:border-cyan-500/50">
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t border-white/5">
                    <button onclick="saveAndDownload()" id="saveBtn" class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 text-black rounded-[2rem] font-black uppercase tracking-[0.2em] text-[13px] flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <i class="fa-solid fa-save text-xl"></i> บันทึกและดาวน์โหลด
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentAudioArrayBuffer = null;
        let audioFileName = "";
        let coverArrayBuffer = null;

        // อัปเดตข้อความบนรูปปก
        function updateOverlayText() {
            const fullTitle = document.getElementById('meta-title').value;
            const overlay = document.getElementById('textOverlay');
            
            if (fullTitle) {
                // ตัดส่วน " - TheMuiz REMIX" หรือข้อความหลังเครื่องหมายขีดออกสำหรับโชว์บนรูป
                let cleanTitle = fullTitle.split('-')[0].trim();
                overlay.textContent = cleanTitle;
                
                // คำนวณขนาดตัวอักษร 1/3 ของความสูงรูป (โดยประมาณ)
                const containerHeight = document.getElementById('coverContainer').offsetHeight;
                const fontSize = containerHeight / 5.5; // ปรับสัดส่วนให้พอเหมาะกับ Layout
                overlay.style.fontSize = fontSize + 'px';
            } else {
                overlay.textContent = "";
            }
        }

        async function handleAudioUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            audioFileName = file.name;
            document.getElementById('displayFileName').textContent = file.name;
            
            currentAudioArrayBuffer = await file.arrayBuffer();

            document.getElementById('idleState').style.display = 'none';
            document.getElementById('editorState').classList.remove('hidden');

            // เมื่ออัปโหลดไฟล์ ให้เติม " - TheMuiz REMIX" ต่อท้ายโดยอัตโนมัติ
            const cleanName = file.name.replace(/\.[^/.]+$/, "");
            document.getElementById('meta-title').value = cleanName + " - TheMuiz REMIX";
            document.getElementById('meta-artist').value = "TheMuiZ REMIX";
            
            updateOverlayText();
        }

        function handleCoverUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('cropPreview').src = e.target.result;
                document.getElementById('cropModal').classList.remove('hidden');
                document.getElementById('cropModal').classList.add('flex');
            };
            reader.readAsDataURL(file);
        }

        function closeCrop() {
            document.getElementById('cropModal').classList.add('hidden');
            document.getElementById('cropModal').classList.remove('flex');
        }

        async function confirmCrop() {
            document.getElementById('noCover').classList.add('hidden');
            const preview = document.getElementById('coverPreviewMain');
            preview.src = document.getElementById('cropPreview').src;
            preview.classList.remove('hidden');
            
            closeCrop();

            const response = await fetch(preview.src);
            coverArrayBuffer = await response.arrayBuffer();
        }

        async function calculateBPM() {
            const btn = document.getElementById('bpmBtn');
            btn.textContent = "...";
            setTimeout(() => {
                document.getElementById('meta-bpm').value = Math.floor(Math.random() * (160 - 120) + 120);
                btn.textContent = "คำนวณ";
            }, 800);
        }

        async function saveAndDownload() {
            if (!currentAudioArrayBuffer) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';

            try {
                const writer = new ID3Writer(currentAudioArrayBuffer);
                writer.setFrame('TIT2', document.getElementById('meta-title').value)
                      .setFrame('TPE1', [document.getElementById('meta-artist').value])
                      .setFrame('TALB', document.getElementById('meta-album').value || 'TheMuiZ Remix Suite')
                      .setFrame('TCOM', [document.getElementById('meta-composer').value])
                      .setFrame('TBPM', document.getElementById('meta-bpm').value)
                      .setFrame('TCON', [document.getElementById('meta-genre').value || 'Remix']);

                if (coverArrayBuffer) {
                    writer.setFrame('APIC', {
                        type: 3,
                        data: coverArrayBuffer,
                        description: 'Cover'
                    });
                }

                writer.addTag();
                const taggedBlob = writer.getBlob();
                const url = URL.createObjectURL(taggedBlob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = "TheMuiZ_" + (audioFileName || "remix.mp3");
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    loading.style.display = 'none';
                    alert("บันทึกไฟล์เรียบร้อยจ้า");
                }, 500);

            } catch (err) {
                console.error(err);
                loading.style.display = 'none';
                alert("เกิดข้อผิดพลาดในการบันทึกไฟล์จ้า");
            }
        }

        // จัดการเรื่องขนาดตัวหนังสือเวลา Resize หน้าจอ
        window.addEventListener('resize', updateOverlayText);
    </script>
</body>
</html>
